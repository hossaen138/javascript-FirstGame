<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>

    <link
      rel="stylesheet"
      href="css/bootstrap.min.css"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #00c6ff, #0072ff);
        text-align: center;
        min-height: 100vh;
      }
      .layer {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 999;
      }
      .txt {
        color: white;
      }
      .box {
        position: fixed;
        z-index: 1000;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .board {
        width: 1000px;
        height: 1000px;
        background: linear-gradient(145deg, #000000, #1c1c1c);
        border-radius: 20px;
        margin: auto;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
      }

      button {
        transition: 0.3s;
      }

      #rock:hover {
        background: #ff4d4d;
        color: black;
      }

      #paper:hover {
        background: #4dff88;
        color: black;
      }

      #scissors:hover {
        background: #fffc4d;
        color: black;
      }

      #div {
        color: red;
        font-size: large;
        margin-top: 10px;
      }
    </style>
  </head>

  <body class="bg-secondary">
    <div class="container">
      <div id="box1">
        <div class="layer"></div>

        <div
          class="box w-100 text-center mb-3 bg-white text-white mt-5 rounded shadow p-5"
          id="leadpannel"
        >
          <label class="form-lebel text-dark" for="inp">Enter Your Name</label>
          <input class="form-control" id="inp" type="text" />
          <button id="btn" class="btn btn-info w-100 mt-3">Submit</button>
          <div class="text-danger h2" id="div"></div>
        </div>
      </div>

      <div class="row justify-content-center my-5">
        <div class="col-12 bg-white text-center p-5 rounded shadow">
          <h1>Rock Paper scissors</h1>

          <div class="row mt-5">
            <div class="col-4">
              <button id="rock" class="btn btn-primary w-100">Rock 👊🏻</button>
            </div>
            <div class="col-4">
              <button id="paper" class="btn btn-primary w-100">Paper ✋🏻</button>
            </div>
            <div class="col-4">
              <button id="scissors" class="btn btn-primary w-100">
                Scissors ✌🏻
              </button>
            </div>
          </div>

          <div class="row mt-5 text-center">
            <div id="b" class="board position-relative">
              <div class="row mt-5">
                <div class="col-6 txt">
                  <h3>Your choice:</h3>
                  <div id="PL"></div>
                </div>

                <div class="col-6 txt">
                  <h3>Computer choice:</h3>
                  <div id="PC"></div>
                </div>

                <div class="col-12 mt-5">
                  <p id="WIN" class="h1 text-danger txt mt-5"></p>
                </div>

                <div class="col-12">
                  <div class="row w-100 position-absolute bottom-0">
                    <h1 class="txt">Scores</h1>
                    <div class="col-6"><p id="you" class="txt">You : 0</p></div>
                    <div class="col-6"><p id="pc" class="txt">PC : 0</p></div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="col-12 mt-5">
            <a id="saveBtn" class="btn btn-success w-100" href="index.html">
              Save and Back To menu
            </a>

            <button
              class="btn btn-dark w-100 mt-3"
              data-bs-toggle="modal"
              data-bs-target="#leaderboardModal"
            >
              Show Leaderboard
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="leaderboardModal">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Leaderboard</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <table class="table table-striped text-center">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Player</th>
                  <th>PC</th>
                  <th>Total</th>
                </tr>
              </thead>
              <tbody id="leaderboardBody"></tbody>
            </table>
          </div>

          <div class="modal-footer">
            <button class="btn btn-danger" data-bs-dismiss="modal">
              Close
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="js/bootstrap.bundle.js"></script>
    <script src="jquery-3.7.1.min.js"></script>
    <script>
      $(function () {
        const rock = $("#rock");
        const paper = $("#paper");
        const scissors = $("#scissors");

        let scorep = 0;
        let scorepc = 0;

        let pos = ["rock", "paper", "scissors"];

        rock.click(() => game("rock"));
        paper.click(() => game("paper"));
        scissors.click(() => game("scissors"));

        function game(choose) {
          let state = pos[Math.floor(Math.random() * 3)];

          let picMap = {
            rock: "./pics/r.png",
            paper: "./pics/p.png",
            scissors: "./pics/s.png",
          };

          let pic1 = picMap[choose];
          let pic2 = picMap[state];

          let result = "";

          if (choose === state) {
            result = "It's a draw";
          } else if (
            (choose === "rock" && state === "scissors") ||
            (choose === "paper" && state === "rock") ||
            (choose === "scissors" && state === "paper")
          ) {
            scorep++;
            result = "You Won";
          } else {
            scorepc++;
            result = "You Lost";
          }

          $("#PL").html(`<img class="img-fluid mt-5" src="${pic1}">`);
          $("#PC").html(`<img class="img-fluid mt-5" src="${pic2}">`);
          $("#WIN").html(`${result}`);
          $("#you").html(`You : ${scorep}`);
          $("#pc").html(`PC : ${scorepc}`);
        }
        $("#btn").click(function () {
          name = $("#inp").val().trim();
          if (name == "") {
            $("#div").html("Please Enter Your Name");
            return;
          }
          localStorage.setItem("name", name);
          $("#box1").html("");
        });

        $("#saveBtn").click(function () {
          let name = localStorage.getItem("name") || "Unknown";

          let players = JSON.parse(localStorage.getItem("players"));

          players.push({
            name: name,
            playerScore: scorep,
            pcScore: scorepc,
            diff: scorep - scorepc,
          });

          localStorage.setItem("players", JSON.stringify(players));
        });

        $("#leaderboardModal").on("show.bs.modal", function () {
          let players = JSON.parse(localStorage.getItem("players"));

          players.sort((a, b) => b.diff - a.diff);

          let html = "";

          players.forEach((p, i) => {
            html += `
            <tr>
              <td>${i + 1}</td>
              <td>${p.name}</td>
              <td>${p.playerScore}</td>
              <td>${p.pcScore}</td>
              <td>${p.diff}</td>
            </tr>
          `;
          });

          $("#leaderboardBody").html(html);
        });
      });
    </script>
  </body>
</html>
