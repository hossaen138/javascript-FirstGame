<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="css/bootstrap.min.css"
    />
    <title>Memory Game</title>
    <style>
      body {
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #1f1c2c, #928dab);
        text-align: center;
        min-height: 100vh;
      }

      .board {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
        gap: 15px;
        justify-content: center;
        margin: 30px auto;
        max-width: 500px;
      }

      .card {
        width: 100%;
        height: 100px;
        background: linear-gradient(145deg, #2c2c2c, #1a1a1a);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 35px;
        cursor: pointer;
        border-radius: 15px;
        user-select: none;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        transition:
          transform 0.5s,
          box-shadow 0.3s;
      }

      .card:hover {
        transform: scale(1.08);
        box-shadow: 0 0 20px #00f7ff;
      }

      .card.flip {
        transform: rotateY(180deg);
      }

      .flipped {
        background: linear-gradient(145deg, #ffffff, #dcdcdc);
        color: black;
        transform: rotateY(180deg);
      }

      .stats {
        margin-top: 20px;
        font-size: 20px;
        color: white;
      }

      button {
        border-radius: 10px !important;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.02);
      }
      @keyframes pop {
        0% {
          transform: scale(0.7);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      /* ----------------------------------------------------------- */
      .layer {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        z-index: 999;
      }

      .box {
        position: fixed;
        z-index: 1000;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      #div {
        color: red;
        font-size: large;
        margin-top: 10px;
      }

      /* -------------------------------------------------------------- */
    </style>
  </head>
  <body class="d-flex justify-content-center align-items-center">
    <div class="container my-5">
      <div class="row bg-dark text-white mt-5 rounded shadow p-3">
        <div class="col-12">
          <div class="row">
            <div class="col-12 text-center mb-3" id="pannel">
              <p class="fs-1">Memory test game</p>
              <p>Settings⚙️</p>
              <div class="row">
                <div class="col-12 text-start">
                  <label for="inpName" class="text-secondary"
                    >UserName :
                  </label>
                  <input
                    placeholder="UserName : "
                    id="inpName"
                    class="form-control"
                    type="text"
                  />
                </div>
                <div class="col-12 mt-3">
                  <label class="fs-3" for="dif"
                    >Choose The Games Difficalty</label
                  >
                  <select name="" class="form-select" id="dif">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                  </select>
                </div>
                <div class="col-12 mt-3">
                  <button id="start" class="btn btn-success w-100">
                    Start
                  </button>
                  <button id="Leaderboard" class="btn btn-info mt-5 w-100">
                    Leader Board
                  </button>
                  <a class="btn btn-warning w-100 mt-3" href="index.html"
                    >Go Back</a
                  >
                  <div id="div"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
        <script src="js/bootstrap.bundle.js"></script>
    <script src="jquery-3.7.1.min.js"></script>
    <script>
      const slct = $("#dif");
      const div = $("#div");
      const pannel = $("#pannel");
      const inpName = $("#inpName");
      const start = $("#start");
      let timerInterval;
      let name;

      start.click(function () {
        const name = $("#inpName").val();
        const dif = $("#dif").val();

        div.html("");

        if (!name.trim()) {
          div.html("Please Enter Your Name");
          return;
        }

        startgame(name);
      });
      let startgame = function (name) {
        const dif = $("#dif").val();
        pannel.html(`
            <h1>🧠 Memory Game</h1>
        <h3>${name}</h3>
    <div class="stats">
      ⏱ Time: <span id="time">0</span> | ⭐ Score: <span id="score">0</span>
    </div>

    <div class="board" id="board"></div>
    <button id="restartLevel" class="btn btn-success w-100 my-2">
       Restart Level
    </button>
    <button id="Menu" class="btn btn-danger w-100">
      Go To Main Menu
    </button>
    
    `);

        const board = document.getElementById("board");
        const timeEl = document.getElementById("time");
        const scoreEl = document.getElementById("score");
        $("#restartLevel").click(function () {
          startgame(name);
        });

        $("#Menu").click(function () {
          goToMenu();
        });
        let cards = [];
        let maxscore = 0;
        let maxtime = 0;
        switch (dif) {
          case "easy":
            cards = ["🍎", "🍌", "🍇", "🍒", "🍎", "🍌", "🍇", "🍒"];
            maxscore = 40;
            maxtime = 30;
            break;
          case "medium":
            cards = [
              "🍎",
              "🍌",
              "🍇",
              "🍒",
              "🍎",
              "🍌",
              "🍇",
              "🍒",
              "🍍",
              "🍋",
              "🍓",
              "🍄",
              "🍍",
              "🍋",
              "🍓",
              "🍄",
            ];
            maxscore = 80;
            maxtime = 90;
            break;
          case "hard":
            cards = [
              "🍎",
              "🍎",
              "🍌",
              "🍌",
              "🍇",
              "🍇",
              "🍒",
              "🍒",
              "🍉",
              "🍉",
              "🍓",
              "🍓",
              "🥝",
              "🥝",
              "🍍",
              "🍍",
              "🥑",
              "🥑",
              "🍑",
              "🍑",
              "🍋",
              "🍋",
              "🍊",
              "🍊",
              "🍐",
              "🍐",
              "🥥",
              "🥥",
              "🍈",
              "🍈",
              "🫐",
              "🫐",
            ];
            maxscore = 160;
            maxtime = 180;
            break;
        }

        cards.sort(() => Math.random() - 0.5);
        clearInterval(timerInterval);
        draw(cards, board, timeEl, scoreEl, maxscore, maxtime, name);
      };
      let draw = function (
        cards,
        board,
        timeEl,
        scoreEl,
        maxscore,
        maxtime,
        name,
      ) {
        let first = null;
        let second = null;
        let lock = false;
        let score = 0;
        let time = 0;
        cards.forEach((emoji, index) => {
          const div = document.createElement("div");
          div.classList.add("card");
          div.dataset.value = emoji;
          div.innerHTML = "❓";

          div.onclick = function () {
            if (lock || div.classList.contains("flipped")) return;

            div.classList.add("flip");

            setTimeout(() => {
              div.innerHTML = emoji;
              div.classList.add("flipped");
            }, 150);

            if (!first) {
              first = div;
              first.style.boxShadow = "0 0 20px lime";
            } else {
              second = div;
              lock = true;

              second.style.boxShadow = "0 0 20px lime";

              if (first.dataset.value === second.dataset.value) {
                score += 10;
                reset();
              } else {
                setTimeout(() => {
                  first.style.boxShadow = "0 0 20px red";
                  second.style.boxShadow = "0 0 20px red";
                  first.innerHTML = "❓";
                  second.innerHTML = "❓";
                  first.classList.remove("flipped", "flip");
                  second.classList.remove("flipped", "flip");
                  reset();
                }, 800);
              }

              scoreEl.innerText = score;
            }
          };

          board.appendChild(div);

          lock = true;
          const allCards = board.querySelectorAll(".card");
          allCards.forEach((card) => {
            card.innerHTML = card.dataset.value;
            card.classList.add("flipped");
          });

          setTimeout(() => {
            allCards.forEach((card) => {
              card.innerHTML = "❓";
              card.classList.remove("flipped", "flip");
            });
            lock = false;
          }, 2000);
        });
        function reset() {
          setTimeout(() => {
            first.style.boxShadow = "";
            second.style.boxShadow = "";
          }, 300);
          setTimeout(() => {
            first = null;
            second = null;
            lock = false;
          }, 300);
        }
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
          time++;
          timeEl.innerText = time;

          if (time >= maxtime) {
            lose();
          }
          if (score >= maxscore) {
            win(score, time);
          }
        }, 1000);
        function lose() {
          clearInterval(timerInterval);

          pannel.html(`
    <img class="img-fluid" src="./lose.gif" alt="">
    <button id="restartLevel" class="btn btn-success w-100 my-2">
       Restart Level
    </button>
    <button id="Menu" class="btn btn-danger w-100">
      Go To Main Menu
    </button>
    
  `);
          pannel.css("animation", "pop 0.5s ease");
          $("#restartLevel").click(function () {
            endgame();
          });

          $("#Menu").click(function () {
            goToMenu();
          });
        }
        function win(score, time) {
          clearInterval(timerInterval);
          let records = JSON.parse(localStorage.getItem("memoryGameRecords"));

          let newRecord = {
            name: name,
            score: score,
            time: time,
          };

          records.push(newRecord);

          localStorage.setItem("memoryGameRecords", JSON.stringify(records));

          pannel.html(`
          <p>${name}</p>
        <p>score=${score}</p>
        <p>time=${time}</p>
    <img class="img-fluid" src="./win.webp" alt="">
    <button id="restartLevel" class="btn btn-success w-100 my-2">
       Restart Level
    </button>
    <button id="Menu" class="btn btn-success w-100">
      Go To Main Menu
    </button>
    
  `);
          $("#restartLevel").click(function () {
            endgame();
          });

          $("#Menu").click(function () {
            goToMenu();
          });
          pannel.css("animation", "pop 0.5s ease");
        }
        function endgame() {
          first = null;
          second = null;
          lock = false;
          time = 0;
          score = 0;
          cards.sort(() => Math.random() - 0.5);
          pannel.html(`
    <h1>🧠 Memory Game</h1>
            <h3>${name}</h3>
    <div class="stats">
      ⏱ Time: <span id="time">0</span> | ⭐ Score: <span id="score">0</span>
    </div>
    <div class="board" id="board"></div>
    <button id="restartLevel" class="btn btn-success w-100 my-2">
       Restart Level
    </button>
    <button id="Menu" class="btn btn-danger w-100">
      Go To Main Menu
    </button>

    
  `);
          $("#restartLevel").click(function () {
            endgame();
          });

          $("#Menu").click(function () {
            goToMenu();
          });

          const board = document.getElementById("board");
          const timeEl = document.getElementById("time");
          const scoreEl = document.getElementById("score");
          draw(cards, board, timeEl, scoreEl, maxscore, maxtime, name);
        }
      };
      function goToMenu() {
        clearInterval(timerInterval);
        pannel.html(`
    <p class="fs-1">Memory test game</p>
              <p>Settings⚙️</p>
              <div class="row">
                <div class="col-12 text-start">
                  <label for="inpName" class="text-secondary"
                    >UserName :
                  </label>
                  <input
                    placeholder="UserName : "
                    id="inpName"
                    class="form-control"
                    type="text"
                  />
                </div>
                <div class="col-12 mt-3">
                  <label class="fs-3" for="dif"
                    >Choose The Games Difficalty</label
                  >
                  <select name="" class="form-select" id="dif">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                  </select>
                </div>
                <div class="col-12 mt-3">
                  <button id="start" class="btn btn-success w-100">
                    Start
                  </button>
                  <button id="Leaderboard" class="btn btn-info mt-5 w-100">
                    Leader Board
                  </button>
                  <a class="btn btn-warning w-100 mt-3" href="index.html"
                    >Go Back</a
                  >
                  <div id="div"></div>
                </div>
              </div>
  `);

        $("#start").click(function () {
          const name = $("#inpName").val();
          if (!name.trim()) {
            $("#div").html("Please Enter Your Name");
            return;
          }
          startgame(name);
        });
      }

      $(document).on("click", "#Leaderboard", function () {
        let records =
          JSON.parse(localStorage.getItem("memoryGameRecords")) || [];

        records.sort((a, b) => {
          if (b.score === a.score) {
            return a.time - b.time;
          }
          return b.score - a.score;
        });
        $("#div").append(`
        <div class="layer "></div>

    <div
      class="box w-100 text-center mb-3 bg-white text-white mt-5 rounded shadow p-5"
      id="leadpannel"
    >
    <div class="text-end mb-2 w-100"><button id="btnclose" class="btn btn-close bg-danger p-2 rounded-circle"></button></div>
      <table class="table table-striped table-dark w-100 text-center table-hover">
        <thead>
          <tr class="table-dark">
            <th>NAME</th>
            <th>SCORE</th>
            <th>TIME</th>
          </tr>
        </thead>
        <tbody id="leaderBody">
          
        </tbody>
      </table>
    </div>
        `);
        let tbody = $("#leaderBody");
        tbody.html("");

        records.forEach((r) => {
          tbody.append(`
    <tr>
      <td>${r.name}</td>
      <td>${r.score}</td>
      <td>${r.time}</td>
    </tr>
  `);
        });
        $("#btnclose").click(function () {
          $(".layer, #leadpannel").remove();
        });
      });
    </script>
  </body>
</html>
